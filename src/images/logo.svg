    <svg
    viewBox="0 0 260 260"
    xmlns="http://www.w3.org/2000/svg"
    >
    <!-- Outermost metallic ring -->
    <circle cx="130" cy="130" r="120" fill="#8a8a8a" />

    <!-- Light ring -->
    <circle cx="130" cy="130" r="110" fill="#ebe7c9" />

    <!-- Brown ring -->
    <circle cx="130" cy="130" r="95" fill="#8c6545" />

    <!-- Light ring -->
    <circle cx="130" cy="130" r="85" fill="#ebe7c9" />

    <!-- Light red ring -->
    <circle cx="130" cy="130" r="65" fill="#e2c6ac" />

    <!-- Inner light background (smaller now) -->
    <circle cx="130" cy="130" r="55" fill="#ebe7c9" />

    <!-- Directional notches rotated 45 degrees -->
    <!-- NE -->
    <rect
        x="185"
        y="45"
        width="6"
        height="18"
        fill="#8c6545"
        rx="2"
        transform="rotate(40 194 48)"
    />

    <!-- SE -->
    <rect
        x="185"
        y="202"
        width="6"
        height="18"
        fill="#8c6545"
        rx="2"
        transform="rotate(139 193 208)"
    />

    <!-- NW -->
    <rect
        x="45"
        y="52"
        width="6"
        height="18"
        fill="#8c6545"
        rx="2"
        transform="rotate(-40 54 48)"
    />

    <!-- SW -->
    <rect
        x="45"
        y="208"
        width="6"
        height="18"
        fill="#8c6545"
        rx="2"
        transform="rotate(-138 54 208)"
    />


    <!-- Compass needle (north = green, south = red) -->
    <!-- North needle -->
    <polygon
        points="130,55 145,130 130,140 115,130"
        fill="#bb8588"
        stroke="#8c6545"
        stroke-width="3"
        stroke-linejoin="round"
    />

    <!-- South needle -->
    <polygon
        points="130,205 145,130 130,120 115,130"
        fill="#c8d694"
        stroke="#8c6545"
        stroke-width="3"
        stroke-linejoin="round"
    />

    <!-- Center circle -->
    <circle cx="130" cy="130" r="8" fill="#8c6545" />
</svg>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Outside</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/src/styles/base.css">
    <link rel="stylesheet" href="/src/styles/tablet.css">
    <link rel="stylesheet" href="/src/styles/desktop.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Roboto+Condensed:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header id="partial-header"></header>
    <main id="animal-watch-main">
        <!-- Select Location Banner -->
        <section class="banner-section" id="select-location-banner">
            <div class="banner-card" id="select-location-card">
                <h3>Select Location</h3>
                <p>Choose a location to get personalized outdoor recommendations based on real-time conditions.</p>
                <p class="disclaimer">*Location selection is currently under development.</p>
            </div>
        </section>

        <!-- Weather Map -->
        <section class="weather-map" id="home-weather-map">
            <div class="map-container" id="home-weather-map-container">
                <h2>Weather Map</h2>
                <p>Coming Soon!</p>
                <!-- Weather map will be dynamically inserted here -->
            </div>
        </section>

        <!-- Bird Sightings -->
        <section class="bird-sightings" id="bird-sightings-display">
            <div class="bird-sightings-content" id="home-bird-sightings-content">
                <h2>Loading Bird Sightings...</h2>
            </div>
        </section>

        <!-- Migration Patterns -->
        <section class="migration-patterns" id="home-migration-patterns">
            <div class="migration-patterns-header" id="home-migration-patterns-header">
                <h2>Migration Patterns</h2>
            </div>
            <div class="migration-patterns-content" id="home-migration-patterns-content">
                <!-- Migration patterns will be dynamically inserted here -->
            </div>
        </section>

        <!-- Endangered Species -->
        <section class="endangered-species" id="home-endangered-species">
            <div class="endangered-species-header" id="home-endangered-species-header">
                <h2>Endangered Species</h2>
            </div>
            <div class="endangered-species-content" id="home-endangered-species-content">
                <!-- Endangered species information will be dynamically inserted here -->
            </div>
        </section>

        <!-- Wildlife Events -->
        <section class="wildlife-events" id="home-wildlife-events">
            <div class="wildlife-events-header" id="home-wildlife-events-header">
                <h2>Upcoming Wildlife Events</h2>
            </div>
            <div class="wildlife-events-content" id="home-wildlife-events-content">
                <!-- Wildlife events will be dynamically inserted here -->
            </div>
    </main>
    <footer id="partial-footer"></footer>
</body>
</html>

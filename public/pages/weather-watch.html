<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Outside</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/public/styles/base.css">
    <link rel="stylesheet" href="/public/styles/tablet.css">
    <link rel="stylesheet" href="/public/styles/desktop.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Roboto+Condensed:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header id="partial-header"></header>
    <main>

        <!-- Select Location Banner -->
        <section class="banner-section" id="select-location-banner">
            <div class="banner-card" id="select-location-card">
                <h3>Select Location</h3>
                <p>Choose a location to get personalized outdoor recommendations based on real-time conditions.</p>
                <p class="disclaimer">*Location selection is currently under development.</p>
            </div>
        </section>

        <!-- Weather Map -->
        <section class="weather-map" id="home-weather-map">
            <div class="map-container" id="home-weather-map-container">
                <h2>Weather Map</h2>
                <p>Coming Soon!</p>
                <!-- Weather map will be dynamically inserted here -->
            </div>
        </section>

        <!--  -->
        <section class="weather-forecast" id="home-weather-forecast">
            <div class="forecast-header" id="home-weather-forecast-header">
                <h2>7-Day Weather Forecast</h2>
            </div>
            <div class="forecast-content" id="home-weather-forecast-content">
                <!-- 7-Day Weather Cards will be dynamically inserted here -->
                <div class="forecast-card" id="forecast-today"></div>
                <div class="forecast-card" id="forecast-day-1"></div>
                <div class="forecast-card" id="forecast-day-2"></div>
                <div class="forecast-card" id="forecast-day-3"></div>
                <div class="forecast-card" id="forecast-day-4"></div>
                <div class="forecast-card" id="forecast-day-5"></div>
                <div class="forecast-card" id="forecast-day-6"></div>
            </div>
        </section>
    </main>
    <footer id="partial-footer"></footer>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Outside</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/public/styles/base.css">
    <link rel="stylesheet" href="/public/styles/tablet.css">
    <link rel="stylesheet" href="/public/styles/desktop.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Roboto+Condensed:wght@400;700&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <header id="partial-header"></header>
    <main>
        <!-- Select Location Banner -->
        <section class="banner-section" id="select-location-banner">
            <div class="banner-card" id="select-location-card">
                <h3>Select Location</h3>
                <p>Choose a location to get personalized outdoor recommendations based on real-time conditions.</p>
                <p class="disclaimer">*Location selection is currently under development.</p>
            </div>
        </section>

        <!-- Weather Map -->
        <section class="weather-map" id="home-weather-map">
            <div class="map-container" id="home-weather-map-container">
                <h2>Weather Map</h2>
                <p>Coming Soon!</p>
                <!-- Weather map will be dynamically inserted here -->
            </div>
        </section>

        <section class="celestial-events" id="home-celestial-events">
            <div class="celestial-events-header" id="home-celestial-events-header">
                <h2>Upcoming Celestial Events</h2>
            </div>
            <div class="celestial-events-content" id="home-celestial-events-content">
                <!-- Celestial events will be dynamically inserted here -->
                <div class="celestial-event-card" id="celestial-event-1"></div>
                <div class="celestial-event-card" id="celestial-event-2"></div>
                <div class="celestial-event-card" id="celestial-event-3"></div>
            </div>
        </section>

        <!-- Current Moon Phase -->
        <section class="moon-phase" id="home-moon-phase">
            <div class="moon-phase-header" id="home-moon-phase-header">
                <h2>Current Moon Phase</h2>
            </div>
            <div class="moon-phase-content" id="home-moon-phase-content">
                <!-- Moon phase information will be dynamically inserted here -->
            </div>
        </section>

        <!-- Solar System Planetary Positions -->
        <section class="planetary-positions" id="home-planetary-positions">
            <div class="planetary-positions-header" id="home-planetary-positions-header">
                <h2>Our Solar System</h2>
            </div>
            <div class="planetary-positions-content" id="home-planetary-positions-content">
                <!-- Planetary position information will be dynamically inserted here -->
            </div>
        </section>

        <!-- Interesting Facts -->
        <section class="interesting-facts" id="home-interesting-facts">
            <div class="interesting-facts-header" id="home-interesting-facts-header">
                <h2>Interesting Celestial Facts</h2>
            </div>
            <div class="interesting-facts-content" id="home-interesting-facts-content">
                <!-- Interesting facts will be dynamically inserted here -->
            </div>
        </section>

        <!-- ISS Status -->
        <section class="iss-status" id="home-iss-status">
            <div class="iss-status-header" id="home-iss-status-header">
                <h2>ISS Status</h2>
            </div>
            <div class="iss-status-content" id="home-iss-status-content">
                <!-- ISS status information will be dynamically inserted here -->
            </div>
        </section>
    </main>
    <footer id="partial-footer"></footer>
</body>
</html>
